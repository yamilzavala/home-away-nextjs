name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set env vars for CI
        run: |
          echo "SUPABASE_URL=https://dummy.supabase.co" >> .env
          echo "SUPABASE_KEY=dummy" >> .env

      - name: Run tests
        run: pnpm test -- --run

      - name: Build app
        run: pnpm build